name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;25.1.8937393'

      - name: Download dependency archives from Google Drive
        run: |
          pip install gdown
          gdown --folder --no-cookies "https://drive.google.com/drive/folders/1g-Q_i7cf6Ua4KX9ZM6V282EEZvTVVfF7" -O /tmp/deps-raw

          DEPS_DIR=$(find /tmp/deps-raw -maxdepth 2 -name "models.zip" -printf "%h" -quit 2>/dev/null || echo /tmp/deps-raw)
          echo "Dependency files located in: $DEPS_DIR"
          ls -laR "$DEPS_DIR"

          # Extract each zip to a tmp location first to inspect structure
          mkdir -p /tmp/extract
          for f in models subpack jniLibs libs; do
            if [ -f "$DEPS_DIR/${f}.zip" ]; then
              mkdir -p /tmp/extract/$f
              unzip -q -o "$DEPS_DIR/${f}.zip" -d /tmp/extract/$f
              echo "=== Contents of ${f}.zip ==="
              ls -R /tmp/extract/$f | head -40
            fi
          done

          # models -> app/src/main/assets/models/
          mkdir -p app/src/main/assets/models
          if [ -d /tmp/extract/models ]; then
            # Check if zip contains "models/" subdir or flat files
            if [ -d /tmp/extract/models/models ]; then
              cp -r /tmp/extract/models/models/* app/src/main/assets/models/
            else
              cp -r /tmp/extract/models/* app/src/main/assets/models/
            fi
          fi

          # subpack -> app/src/main/assets/subpack/
          mkdir -p app/src/main/assets/subpack
          if [ -d /tmp/extract/subpack ]; then
            if [ -d /tmp/extract/subpack/subpack ]; then
              cp -r /tmp/extract/subpack/subpack/* app/src/main/assets/subpack/
            else
              cp -r /tmp/extract/subpack/* app/src/main/assets/subpack/
            fi
          fi

          # jniLibs -> app/src/main/jniLibs/
          mkdir -p app/src/main/jniLibs
          if [ -d /tmp/extract/jniLibs ]; then
            # Handle various internal structures
            if [ -d /tmp/extract/jniLibs/jniLibs ]; then
              cp -r /tmp/extract/jniLibs/jniLibs/* app/src/main/jniLibs/
            elif [ -d "/tmp/extract/jniLibs/app/src/main/jniLibs" ]; then
              cp -r /tmp/extract/jniLibs/app/src/main/jniLibs/* app/src/main/jniLibs/
            else
              cp -r /tmp/extract/jniLibs/* app/src/main/jniLibs/
            fi
          fi

          # libs -> app/libs/
          mkdir -p app/libs
          if [ -d /tmp/extract/libs ]; then
            if [ -d /tmp/extract/libs/libs ]; then
              cp -r /tmp/extract/libs/libs/* app/libs/
            elif [ -d "/tmp/extract/libs/app/libs" ]; then
              cp -r /tmp/extract/libs/app/libs/* app/libs/
            else
              cp -r /tmp/extract/libs/* app/libs/
            fi
          fi

          # Verify final structure
          echo "=== Final jniLibs structure ==="
          ls -la app/src/main/jniLibs/
          echo "=== Final libs structure ==="
          ls -la app/libs/

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build web-chat frontend
        run: |
          npm install
          npm --prefix web-chat install
          npm run build:webchat

      - name: Sync example packages
        run: python3 sync_example_packages.py

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: operit-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
